<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>심희진 2023–2025 작업물 유사성 네트워크 3D</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Inter", "Helvetica Neue", Arial, sans-serif;
      background: radial-gradient(circle at center, #0B0F19 0%, #030407 100%);
      color: #eee;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    nav {
      display: flex;
      align-items: center;
      height: 54px;
      padding: 0 32px;
      gap: 32px;
      background: transparent;
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
      flex-shrink: 0;
      z-index: 20;
      position: relative;
    }

    .nav-brand {
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      letter-spacing: -0.01em;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .nav-item {
      font-size: 13px;
      color: #666;
      cursor: pointer;
      user-select: none;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: color .12s;
    }

    .nav-item:hover {
      color: #fff;
    }

    .nav-right {
      margin-left: auto;
      font-size: 12px;
      color: #444;
      letter-spacing: 0.01em;
    }

    #canvasWrap {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    #tooltip {
      position: fixed;
      pointer-events: none;
      background: rgba(5, 6, 10, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #fff;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 12px;
      line-height: 1.6;
      display: none;
      z-index: 999;
      max-width: 240px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.8);
    }

    #hint {
      position: absolute;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      color: rgba(255, 255, 255, 0.2);
      pointer-events: none;
      white-space: nowrap;
      letter-spacing: 0.04em;
      z-index: 10;
    }

    #legend {
      position: absolute;
      top: 16px;
      right: 18px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      pointer-events: none;
      z-index: 10;
    }

    .leg {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.45);
    }

    .leg-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .node-label {
      color: rgba(255, 255, 255, 0.9);
      font-size: 10px;
      font-weight: 500;
      font-family: -apple-system, Arial, sans-serif;
      pointer-events: none;
      text-shadow: 0 1px 4px rgba(0, 0, 0, 0.9);
      white-space: nowrap;
      transition: opacity 0.3s;
    }

    .edge-label {
      color: rgba(255, 255, 255, 0.75);
      font-size: 10px;
      font-family: -apple-system, Arial, sans-serif;
      pointer-events: none;
      background: rgba(0, 0, 0, 0.5);
      padding: 2px 7px;
      border-radius: 4px;
      white-space: nowrap;
      display: none;
    }

    #sidePanel {
      position: fixed;
      top: 48px;
      right: -370px;
      width: 345px;
      bottom: 0;
      background: rgba(11, 12, 16, 0.97);
      border-left: 1px solid rgba(255, 255, 255, 0.07);
      box-shadow: -8px 0 30px rgba(0, 0, 0, 0.5);
      transition: right 0.35s cubic-bezier(0.1, 0.9, 0.2, 1);
      z-index: 50;
      padding: 36px 28px;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    #sidePanel.open {
      right: 0;
    }

    .sp-category {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      padding: 5px 12px;
      border-radius: 20px;
      color: #fff;
      margin-bottom: 14px;
    }

    .sp-title {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 20px;
      letter-spacing: -0.02em;
    }

    .sp-section {
      margin-bottom: 24px;
    }

    .sp-label {
      font-size: 11px;
      color: #555;
      font-weight: 600;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .sp-text {
      font-size: 13.5px;
      color: #aaa;
      line-height: 1.6;
      word-break: keep-all;
    }

    .sp-close {
      position: absolute;
      top: 20px;
      right: 24px;
      cursor: pointer;
      font-size: 24px;
      color: #444;
      line-height: 1;
      transition: color 0.1s;
    }

    .sp-close:hover {
      color: #fff;
    }
  </style>
</head>

<body>

  <nav>
    <div class="nav-brand">✦ 심희진 2023–2025</div>
    <div class="nav-item" onclick="shuffleNodes()">↻ &nbsp;Shuffle</div>
    <div class="nav-item" onclick="clearSelection()">◎ &nbsp;Clear</div>
    <div class="nav-right">Similarity Network 3D · KAA Design</div>
  </nav>

  <div id="canvasWrap">
    <div id="legend"></div>
    <div id="hint">노드 클릭 · 드래그로 회전 · 스크롤로 줌</div>
  </div>
  <div id="tooltip"></div>
  <div id="sidePanel">
    <div class="sp-close" onclick="clearSelection()">×</div>
    <div id="sp-content"></div>
  </div>

  <script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"
  }
}
</script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

    // ── Data ──
    const DOMAIN_COLOR = {
      "Editorial & Print": "#7F77DD",
      "Typography": "#1D9E75",
      "Illustration & Narrative": "#D4537E",
      "Video & Animation": "#378ADD",
      "Brand & Graphic Systems": "#BA7517",
      "Communication & Media": "#D85A30",
      "Research & Writing": "#888780",
      "Portfolio & Archive": "#639922",
      "Foundational Form": "#B4B2A9",
    };

    const DOMAIN_INFO = {
      "Typography": { ko: "타이포그래피", desc: "1학년 포스터 실험 → 2학년 면봉체 독자 폰트 개발로 역량 심화." },
      "Editorial & Print": { ko: "편집·출판 디자인", desc: "1학년 웨이파인딩·책자 → 3학년 InDesign 중철 제본으로 출판 제작 과정 전문화." },
      "Illustration & Narrative": { ko: "일러스트·캐릭터·서사", desc: "단순 전시 일러스트 → 캐릭터 만화 기획 → 스토리보드·창작 원고로 서사적 표현 확장." },
      "Video & Animation": { ko: "영상·애니메이션", desc: "1학년 팀 영상 편집 → 2학년 스토리보드 및 AfterEffects 개인 작업 체제로 전환." },
      "Brand & Graphic Systems": { ko: "브랜드·그래픽 시스템", desc: "2학년 BX 팀 프로젝트 경험을 기반으로 3학년 색채 채집 개인 그래픽 시스템으로 응용 변화." },
      "Communication & Media": { ko: "커뮤니케이션·복합 미디어", desc: "소책자, 영상, 일러스트 복합 매체 사용 → 정보 시각화(인포비주) 및 인터랙션 실험으로 기능적 확장." },
      "Research & Writing": { ko: "리서치·글쓰기·기획", desc: "인문학 글쓰기로 시작해 문화예술교육 기획을 거쳐 서적 설계 에세이로 이어지는 논리적 텍스트 계보." },
      "Portfolio & Archive": { ko: "포트폴리오·아카이빙", desc: "2학년 시기에 집중적으로 나타난 작업물 및 디자인 포트폴리오 아카이빙 활동." },
      "Foundational Form": { ko: "기초 조형", desc: "2D 파운데이션 등 평면 조형 원리와 기초적인 시각적 형태 실험 과정." }
    };

    const NODES = [
      { id: "2023-C1", year: 2023, short: "Wayfinding", works: 2, size_mb: 2723, tools: "InDesign", collab: "Solo", domain: "Editorial & Print" },
      { id: "2023-C2", year: 2023, short: "2D Found.", works: 2, size_mb: 157, tools: "Illustrator", collab: "Solo", domain: "Foundational Form" },
      { id: "2023-C3", year: 2023, short: "Typo(23)", works: 2, size_mb: 201, tools: "Illustrator", collab: "Solo", domain: "Typography" },
      { id: "2023-C4", year: 2023, short: "Exhibit(23)", works: 1, size_mb: 435, tools: "Illus+AE", collab: "Solo", domain: "Illustration & Narrative" },
      { id: "2023-C5", year: 2023, short: "Video Team", works: 1, size_mb: 4920, tools: "Video Edit", collab: "Team", domain: "Video & Animation" },
      { id: "2023-C6", year: 2023, short: "Writing(23)", works: 1, size_mb: 23, tools: "Word", collab: "Solo", domain: "Research & Writing" },
      { id: "2023-C7", year: 2023, short: "Booklet(23)", works: 1, size_mb: 1, tools: "Edit Tools", collab: "Solo", domain: "Editorial & Print" },
      { id: "2023-C8", year: 2023, short: "Sabujeok", works: 1, size_mb: 2, tools: "Illustrator", collab: "Group", domain: "Illustration & Narrative" },
      { id: "2024-C1", year: 2024, short: "BX(24)", works: 5, size_mb: 1206, tools: "Illus+PPT", collab: "Team+Solo", domain: "Brand & Graphic Systems" },
      { id: "2024-C2", year: 2024, short: "Typo(24)", works: 1, size_mb: 909, tools: "Illustrator", collab: "Solo", domain: "Typography" },
      { id: "2024-C3", year: 2024, short: "Comms(24)", works: 3, size_mb: 790, tools: "Illus+AE", collab: "Solo", domain: "Communication & Media" },
      { id: "2024-C4", year: 2024, short: "Character(24)", works: 2, size_mb: 20, tools: "Illustrator", collab: "Solo", domain: "Illustration & Narrative" },
      { id: "2024-C5", year: 2024, short: "Story(24)", works: 2, size_mb: 525, tools: "AE+PPT", collab: "Solo", domain: "Video & Animation" },
      { id: "2024-C6", year: 2024, short: "Convergence", works: 1, size_mb: 0, tools: "Illustrator", collab: "Team", domain: "Brand & Graphic Systems" },
      { id: "2024-C7", year: 2024, short: "CultureArts", works: 1, size_mb: 95, tools: "PPT+Word", collab: "Solo", domain: "Research & Writing" },
      { id: "2024-C8", year: 2024, short: "Portfolio", works: 2, size_mb: 1412, tools: "Illustrator", collab: "Solo", domain: "Portfolio & Archive" },
      { id: "2025-C1", year: 2025, short: "Editorial(25)", works: 3, size_mb: 211, tools: "InDesign+Ai", collab: "Solo", domain: "Editorial & Print" },
      { id: "2025-C2", year: 2025, short: "Color(25)", works: 1, size_mb: 3760, tools: "Illustrator", collab: "Solo", domain: "Brand & Graphic Systems" },
      { id: "2025-C3", year: 2025, short: "Story(25)", works: 2, size_mb: 15, tools: "Drawing", collab: "Solo", domain: "Illustration & Narrative" },
      { id: "2025-C4", year: 2025, short: "Manga(25)", works: 1, size_mb: 58, tools: "PPT+Word", collab: "Solo", domain: "Illustration & Narrative" },
      { id: "2025-C5", year: 2025, short: "InfoViz", works: 1, size_mb: 131, tools: "PPT", collab: "Solo", domain: "Communication & Media" },
      { id: "2025-C6", year: 2025, short: "Editorial", works: 1, size_mb: 28, tools: "PPT", collab: "Solo", domain: "Editorial & Print" },
      { id: "2025-C7", year: 2025, short: "InterFusion", works: 1, size_mb: 85, tools: "PPT", collab: "Unknown", domain: "Communication & Media" },
    ];

    const EDGES = [
      { s: "2023-C3", t: "2024-C2", w: 0.88, cross: true },
      { s: "2023-C4", t: "2024-C4", w: 0.80, cross: true },
      { s: "2023-C4", t: "2025-C3", w: 0.72, cross: true },
      { s: "2023-C5", t: "2024-C5", w: 0.72, cross: true },
      { s: "2023-C1", t: "2025-C1", w: 0.80, cross: true },
      { s: "2023-C7", t: "2025-C1", w: 0.75, cross: true },
      { s: "2023-C6", t: "2024-C7", w: 0.65, cross: true },
      { s: "2024-C3", t: "2025-C5", w: 0.68, cross: true },
      { s: "2024-C4", t: "2025-C4", w: 0.78, cross: true },
      { s: "2024-C5", t: "2025-C3", w: 0.75, cross: true },
      { s: "2024-C1", t: "2025-C2", w: 0.62, cross: true },
      { s: "2023-C8", t: "2025-C4", w: 0.60, cross: true },
      { s: "2023-C2", t: "2023-C3", w: 0.70, cross: false },
      { s: "2023-C3", t: "2023-C4", w: 0.60, cross: false },
      { s: "2023-C4", t: "2023-C5", w: 0.72, cross: false },
      { s: "2023-C1", t: "2023-C2", w: 0.62, cross: false },
      { s: "2023-C6", t: "2023-C7", w: 0.55, cross: false },
      { s: "2024-C1", t: "2024-C3", w: 0.72, cross: false },
      { s: "2024-C1", t: "2024-C6", w: 0.75, cross: false },
      { s: "2024-C3", t: "2024-C4", w: 0.75, cross: false },
      { s: "2024-C3", t: "2024-C5", w: 0.78, cross: false },
      { s: "2024-C2", t: "2024-C4", w: 0.65, cross: false },
      { s: "2024-C4", t: "2024-C5", w: 0.70, cross: false },
      { s: "2025-C1", t: "2025-C2", w: 0.68, cross: false },
      { s: "2025-C3", t: "2025-C4", w: 0.80, cross: false },
      { s: "2025-C1", t: "2025-C6", w: 0.70, cross: false },
      { s: "2025-C5", t: "2025-C7", w: 0.62, cross: false },
    ];

    // ── Globals ──
    const wrap = document.getElementById('canvasWrap');
    const tooltip = document.getElementById('tooltip');
    const TOTAL_MB = NODES.reduce((s, n) => s + (n.size_mb || 0), 0);
    const YEAR_Z = { 2023: -180, 2024: 0, 2025: 180 };
    function nodeR(n) { return 10 + n.works * 5; }

    const byId = {};
    NODES.forEach(n => {
      byId[n.id] = n;
      n.x = 0; n.y = 0; n.z = 0;
      n.vx = 0; n.vy = 0; n.vz = 0;
    });

    // ── Scene ──
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x030407);
    scene.fog = new THREE.FogExp2(0x030407, 0.0006);

    const camera = new THREE.PerspectiveCamera(50, wrap.clientWidth / wrap.clientHeight, 1, 5000);
    camera.position.set(0, 40, 650);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: "high-performance" });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(wrap.clientWidth, wrap.clientHeight);
    renderer.domElement.style.position = 'absolute';
    renderer.domElement.style.top = '0';
    renderer.domElement.style.left = '0';
    renderer.domElement.style.zIndex = '1';
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    wrap.appendChild(renderer.domElement);

    const labelRenderer = new CSS2DRenderer();
    labelRenderer.setSize(wrap.clientWidth, wrap.clientHeight);
    labelRenderer.domElement.style.position = 'absolute';
    labelRenderer.domElement.style.top = '0px';
    labelRenderer.domElement.style.left = '0px';
    labelRenderer.domElement.style.zIndex = '2';
    labelRenderer.domElement.style.pointerEvents = 'none';
    wrap.appendChild(labelRenderer.domElement);

    // ── Background Stars ──
    const starsGeo = new THREE.BufferGeometry();
    const starsCount = 4000;
    const posArray = new Float32Array(starsCount * 3);
    for (let i = 0; i < starsCount * 3; i++) {
      posArray[i] = (Math.random() - 0.5) * 3000;
    }
    starsGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
    const starsMat = new THREE.PointsMaterial({
      size: 2.5,
      color: 0xffffff,
      transparent: true,
      opacity: 0.6,
      sizeAttenuation: true,
      blending: THREE.AdditiveBlending
    });
    const starsMesh = new THREE.Points(starsGeo, starsMat);
    scene.add(starsMesh);

    // ── Lights ──
    scene.add(new THREE.AmbientLight(0x1a1c29, 1.2)); // Deep space ambient

    // Powerful cosmic rim light / sun flare equivalent
    const mainLight = new THREE.PointLight(0xffeedd, 350000, 4000);
    mainLight.position.set(-400, 500, -300);
    scene.add(mainLight);

    const fill = new THREE.DirectionalLight(0x5588ff, 1.5);
    fill.position.set(200, -100, 300);
    scene.add(fill);

    // ── Controls ──
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.07;
    controls.minDistance = 80;
    controls.maxDistance = 1400;

    // ── Year guide rings + labels ──
    [2023, 2024, 2025].forEach(year => {
      const ringGeo = new THREE.RingGeometry(198, 201, 80);
      const ringMat = new THREE.MeshBasicMaterial({ color: 0x1e2030, side: THREE.DoubleSide, transparent: true, opacity: 0.7 });
      const ring = new THREE.Mesh(ringGeo, ringMat);
      ring.rotation.x = Math.PI / 2;
      ring.position.z = YEAR_Z[year];
      scene.add(ring);

      const c2 = document.createElement('canvas');
      c2.width = 160; c2.height = 40;
      const ctx2 = c2.getContext('2d');
      ctx2.font = 'bold 28px Arial';
      ctx2.fillStyle = 'rgba(255,255,255,0.16)';
      ctx2.fillText(String(year), 4, 30);
      const spMat = new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(c2), transparent: true, depthWrite: false });
      const sp = new THREE.Sprite(spMat);
      sp.position.set(-240, 0, YEAR_Z[year]);
      sp.scale.set(80, 20, 1);
      scene.add(sp);
    });

    // Subtle floor grid
    const grid = new THREE.GridHelper(700, 18, 0x161820, 0x161820);
    grid.position.y = -200;
    grid.material.transparent = true;
    grid.material.opacity = 0.5;
    scene.add(grid);

    // ── Node Meshes ──
    const nodeMeshes = [];
    const nodeMeshMap = {};

    // Optional: create a reusable canvas for glow sprites
    const canvasGlow = document.createElement('canvas');
    canvasGlow.width = 64; canvasGlow.height = 64;
    const ctxGlow = canvasGlow.getContext('2d');
    const grd = ctxGlow.createRadialGradient(32, 32, 0, 32, 32, 32);
    grd.addColorStop(0, 'rgba(255,255,255,1)');
    grd.addColorStop(0.2, 'rgba(255,255,255,0.8)');
    grd.addColorStop(1, 'rgba(255,255,255,0)');
    ctxGlow.fillStyle = grd;
    ctxGlow.fillRect(0, 0, 64, 64);
    const texGlow = new THREE.CanvasTexture(canvasGlow);

    NODES.forEach(n => {
      const r = nodeR(n);
      const col = new THREE.Color(DOMAIN_COLOR[n.domain] || '#888');

      // Create a nice sleek sphere (Planet)
      const geo = new THREE.SphereGeometry(r, 64, 64);
      const mat = new THREE.MeshStandardMaterial({
        color: col.clone().lerp(new THREE.Color('#000'), 0.2), // Base color slightly darker for depth
        roughness: 0.15,
        metalness: 0.8,
        emissive: col.clone().multiplyScalar(0.4),
        envMapIntensity: 1.0,
      });
      const mesh = new THREE.Mesh(geo, mat);

      // Add an ethereal glow / atmosphere using a sprite
      const spriteMat = new THREE.SpriteMaterial({
        map: texGlow,
        color: col,
        transparent: true,
        opacity: 0.6,
        blending: THREE.AdditiveBlending,
        depthWrite: false
      });
      const sprite = new THREE.Sprite(spriteMat);
      sprite.scale.set(r * 4.2, r * 4.2, 1); // Extra wide glow
      mesh.add(sprite);

      mesh.userData.node = n;
      scene.add(mesh);
      nodeMeshes.push(mesh);
      nodeMeshMap[n.id] = mesh;

      const div = document.createElement('div');
      div.className = 'node-label';
      div.textContent = n.short;
      const lbl = new CSS2DObject(div);
      lbl.position.set(0, r + 8, 0);
      mesh.add(lbl);
      n._labelEl = div;
      n._glowSprite = sprite;
      n._meshMat = mat;
    });

    // ── Edge Lines ──
    EDGES.forEach(e => {
      const a = byId[e.s], b = byId[e.t];
      if (!a || !b) return;
      const geo = new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(a.x, a.y, a.z),
        new THREE.Vector3(b.x, b.y, b.z),
      ]);
      const mat = new THREE.LineBasicMaterial({
        color: e.cross ? 0xaaaaff : 0x777788,
        transparent: true,
        opacity: e.cross ? 0.4 : 0.18,
        depthWrite: false,
      });
      const line = new THREE.Line(geo, mat);
      scene.add(line);
      e._line = line;

      // Edge weight label (CSS2D, shown on selection)
      const ediv = document.createElement('div');
      ediv.className = 'edge-label';
      ediv.textContent = Math.round(e.w * 100) + '% 내용 공유';
      const elbl = new CSS2DObject(ediv);
      scene.add(elbl);
      e._edgeLbl = elbl;
      e._edgeLblEl = ediv;
    });

    // ── Selection state ──
    let selectedNode = null;
    let hoveredNode = null;
    let clusterMesh = null;

    // ── Physics (Cinematic Orbit) ──
    function initPositions() {
      NODES.forEach(n => {
        const angle = Math.random() * Math.PI * 2;
        const radius = 100 + Math.random() * 200;
        n.x = Math.cos(angle) * radius;
        n.y = (Math.random() - 0.5) * 100;
        n.z = YEAR_Z[n.year] + (Math.random() - 0.5) * 50;
        n._angle = angle;
        n._radius = radius;
        n._orbitSpeed = 0.001 + Math.random() * 0.0015;
        n._ty = (Math.random() - 0.5) * 80;
      });
    }

    function stepPhysics() {
      const cx = selectedNode ? selectedNode.x : 0;
      const cy = selectedNode ? selectedNode.y : 0;
      const cz = selectedNode ? selectedNode.z : 0;

      NODES.forEach(n => {
        if (selectedNode === n) {
          // Focus node smoothly moves to absolute center
          n.x += (0 - n.x) * 0.06;
          n.y += (0 - n.y) * 0.06;
          n.z += (0 - n.z) * 0.06;
        } else if (selectedNode && isConnected(selectedNode, n)) {
          // Connected nodes orbit the selected 'sun' node tightly
          n._angle += n._orbitSpeed * 4.0;
          const tr = 110 + nodeR(n) * 2.5; // Orbit radius
          const tx = cx + Math.cos(n._angle) * tr;
          const ty = cy + Math.sin(n._angle * 1.5) * 45;
          const tz = cz + Math.sin(n._angle) * tr * 0.8;
          n.x += (tx - n.x) * 0.05;
          n.y += (ty - n.y) * 0.05;
          n.z += (tz - n.z) * 0.05;
        } else if (selectedNode) {
          // Unconnected nodes drift extremely far into the void
          const dirX = n.x - cx, dirY = n.y - cy, dirZ = n.z - cz;
          const d = Math.sqrt(dirX * dirX + dirY * dirY + dirZ * dirZ) || 1;
          const driftSpeed = 0.015;
          n.x += (dirX / d) * 1800 * driftSpeed - (n.x * 0.01);
          n.y += (dirY / d) * 1800 * driftSpeed - (n.y * 0.01);
          n.z += (dirZ / d) * 1800 * driftSpeed - (n.z * 0.01);
        } else {
          // Normal galaxy state (Orbit around center 0,0,0)
          n._angle += n._orbitSpeed;
          const tx = Math.cos(n._angle) * n._radius;
          const ty = Math.sin(n._angle * 2.0) * n._ty;
          const tz = YEAR_Z[n.year] + Math.sin(n._angle) * (n._radius * 0.7);

          // Gentle repulsion to avoid intersecting
          let pushX = 0, pushY = 0, pushZ = 0;
          NODES.forEach(other => {
            if (other === n) return;
            const dx = n.x - other.x, dy = n.y - other.y, dz = n.z - other.z;
            const dist = Math.sqrt(dx * dx + dy * dy + dz * dz) || 1;
            const minDist = nodeR(n) + nodeR(other) + 25;
            if (dist < minDist) {
              const force = (minDist - dist) * 0.03;
              pushX += (dx / dist) * force;
              pushY += (dy / dist) * force;
              pushZ += (dz / dist) * force;
            }
          });

          n.x += (tx + pushX - n.x) * 0.025;
          n.y += (ty + pushY - n.y) * 0.025;
          n.z += (tz + pushZ - n.z) * 0.025;
        }
      });
    }

    // ── Connected helpers ──
    function getConnected(node) {
      const ids = new Set();
      EDGES.forEach(e => {
        if (e.s === node.id) ids.add(e.t);
        if (e.t === node.id) ids.add(e.s);
      });
      return NODES.filter(n => ids.has(n.id));
    }
    function isConnected(a, b) {
      return EDGES.some(e => (e.s === a.id && e.t === b.id) || (e.t === a.id && e.s === b.id));
    }

    // ── Cluster bubble (transparent sphere wrapping selection) ──
    function setClusterWrap(node) {
      if (clusterMesh) { scene.remove(clusterMesh); clusterMesh.geometry.dispose(); clusterMesh = null; }
      if (!node) return;
      const all = [node, ...getConnected(node)];
      if (all.length < 2) return;
      const cx = all.reduce((s, n) => s + n.x, 0) / all.length;
      const cy = all.reduce((s, n) => s + n.y, 0) / all.length;
      const cz = all.reduce((s, n) => s + n.z, 0) / all.length;
      let maxR = 0;
      all.forEach(n => {
        const d = Math.sqrt((n.x - cx) ** 2 + (n.y - cy) ** 2 + (n.z - cz) ** 2) + nodeR(n) + 14;
        if (d > maxR) maxR = d;
      });
      const col = new THREE.Color(DOMAIN_COLOR[node.domain] || '#888');
      clusterMesh = new THREE.Mesh(
        new THREE.SphereGeometry(1, 32, 32),
        new THREE.MeshBasicMaterial({ color: col, transparent: true, opacity: 0.055, side: THREE.BackSide, depthWrite: false })
      );
      clusterMesh.position.set(cx, cy, cz);
      clusterMesh.scale.setScalar(maxR);
      scene.add(clusterMesh);
    }

    // ── Raycaster ──
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    let mouseDownXY = { x: 0, y: 0 };

    renderer.domElement.addEventListener('mousedown', e => { mouseDownXY.x = e.clientX; mouseDownXY.y = e.clientY; });

    renderer.domElement.addEventListener('click', e => {
      if (Math.hypot(e.clientX - mouseDownXY.x, e.clientY - mouseDownXY.y) > 5) return;
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);
      const hits = raycaster.intersectObjects(nodeMeshes);
      const n = hits.length > 0 ? hits[0].object.userData.node : null;
      selectedNode = (n && selectedNode !== n) ? n : null;
      setClusterWrap(selectedNode);
      updateSidePanel();
    });

    renderer.domElement.addEventListener('mousemove', e => {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);
      const hits = raycaster.intersectObjects(nodeMeshes);
      hoveredNode = hits.length > 0 ? hits[0].object.userData.node : null;
      renderer.domElement.style.cursor = hoveredNode ? 'pointer' : 'default';
      if (hoveredNode) {
        const n = hoveredNode;
        const col = DOMAIN_COLOR[n.domain] || '#888';
        tooltip.style.display = 'block';
        tooltip.style.left = (e.clientX + 14) + 'px';
        tooltip.style.top = (e.clientY - 10) + 'px';
        tooltip.innerHTML = `<strong style="color:${col}">${n.short}</strong><br>
      <div style="color:#888;margin-top:4px;">
        ${n.year} · ${n.domain}<br>
        <strong>전체 파일 중 비중: ${(n.size_mb / TOTAL_MB * 100).toFixed(1)}%</strong> (${n.size_mb}MB)<br>
        ${n.works} work(s) · ${n.tools}
      </div>`;
      } else {
        tooltip.style.display = 'none';
      }
    });

    renderer.domElement.addEventListener('mouseleave', () => { hoveredNode = null; tooltip.style.display = 'none'; });

    // ── Side Panel ──
    function updateSidePanel() {
      const panel = document.getElementById('sidePanel');
      const content = document.getElementById('sp-content');
      if (!selectedNode) { panel.classList.remove('open'); return; }
      const sn = selectedNode;
      const col = DOMAIN_COLOR[sn.domain] || '#333';
      const info = DOMAIN_INFO[sn.domain] || { ko: sn.domain, desc: '' };
      content.innerHTML = `
    <div class="sp-category" style="background:${col}">${info.ko}</div>
    <div class="sp-title">${sn.short}</div>
    <div class="sp-section">
      <div class="sp-label">카테고리 변화 및 개요</div>
      <div class="sp-text">${info.desc}</div>
    </div>
    <div class="sp-section">
      <div class="sp-label">작업물 상세 데이터</div>
      <div class="sp-text">
        <span style="color:#555">작업 연도:</span> <b style="color:#ccc">${sn.year}년</b><br>
        <span style="color:#555">사용 도구:</span> <b style="color:#ccc">${sn.tools}</b><br>
        <span style="color:#555">협업 인원:</span> <b style="color:#ccc">${sn.collab}</b><br>
        <span style="color:#555">산출물 수:</span> <b style="color:#ccc">${sn.works}개</b><br>
        <span style="color:#555">용량 비중:</span> <b style="color:#ccc">${(sn.size_mb / TOTAL_MB * 100).toFixed(1)}%</b> (${sn.size_mb} MB)
      </div>
    </div>`;
      panel.classList.add('open');
    }

    window.clearSelection = function () {
      selectedNode = null;
      setClusterWrap(null);
      updateSidePanel();
    };
    window.shuffleNodes = function () {
      selectedNode = null;
      setClusterWrap(null);
      updateSidePanel();
      initPositions();
    };

    // ── Legend ──
    const legendEl = document.getElementById('legend');
    Object.entries(DOMAIN_COLOR).forEach(([name, col]) => {
      const d = document.createElement('div');
      d.className = 'leg';
      d.innerHTML = `<div class="leg-dot" style="background:${col}"></div>${name}`;
      legendEl.appendChild(d);
    });

    // ── Resize ──
    window.addEventListener('resize', () => {
      const w = wrap.clientWidth, h = wrap.clientHeight;
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      renderer.setSize(w, h);
      labelRenderer.setSize(w, h);
    });

    // ── Visual update per frame ──
    function updateVisuals() {
      NODES.forEach(n => {
        const mesh = nodeMeshMap[n.id];
        mesh.position.set(n.x, n.y, n.z);
        mesh.rotation.y += 0.005; // slowly rotate planet
        mesh.rotation.x += 0.002;

        const isSel = selectedNode === n;
        const isHov = hoveredNode === n;
        const isCon = selectedNode && !isSel && isConnected(selectedNode, n);
        const isDim = !!selectedNode && !isSel && !isCon;

        const mat = mesh.material;
        const sprite = n._glowSprite;
        const baseCol = new THREE.Color(DOMAIN_COLOR[n.domain] || '#888');

        if (isSel) {
          mat.emissive.copy(baseCol).multiplyScalar(1.2);
          mat.color.copy(baseCol);
          mesh.scale.setScalar(1.4);
          if (sprite) { sprite.material.opacity = 1.0; sprite.scale.setScalar(nodeR(n) * 6.0); }
        } else if (isHov) {
          mat.emissive.copy(baseCol).multiplyScalar(0.8);
          mesh.scale.setScalar(1.15);
          if (sprite) { sprite.material.opacity = 0.8; sprite.scale.setScalar(nodeR(n) * 4.5); }
        } else if (isCon) {
          mat.emissive.copy(baseCol).multiplyScalar(0.5);
          mesh.scale.setScalar(1.05);
          if (sprite) { sprite.material.opacity = 0.6; sprite.scale.setScalar(nodeR(n) * 4.0); }
        } else if (isDim) {
          mat.emissive.setHex(0x000000);
          mat.color.copy(baseCol).multiplyScalar(0.2); // super dim
          mesh.scale.setScalar(0.7); // sink away
          if (sprite) sprite.material.opacity = 0.05;
        } else {
          mat.emissive.copy(baseCol).multiplyScalar(0.35);
          mat.color.copy(baseCol).lerp(new THREE.Color('#000'), 0.2);
          mesh.scale.setScalar(1.0);
          if (sprite) { sprite.material.opacity = 0.45; sprite.scale.setScalar(nodeR(n) * 4.2); }
        }

        if (n._labelEl) {
          n._labelEl.style.opacity = isDim ? '0.0' : (isSel ? '1.0' : (isCon || isHov ? '0.9' : '0.6'));
          n._labelEl.style.transform = isSel ? 'scale(1.2)' : 'scale(1)';
        }
      });

      EDGES.forEach(e => {
        if (!e._line) return;
        const a = byId[e.s], b = byId[e.t];
        const pos = e._line.geometry.attributes.position;
        pos.setXYZ(0, a.x, a.y, a.z);
        pos.setXYZ(1, b.x, b.y, b.z);
        pos.needsUpdate = true;
        const active = selectedNode && (e.s === selectedNode.id || e.t === selectedNode.id);
        e._line.material.opacity = selectedNode ? (active ? 0.88 : 0.04) : (e.cross ? 0.38 : 0.16);

        // Edge weight labels
        if (e._edgeLbl) {
          const mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2 + 6, mz = (a.z + b.z) / 2;
          e._edgeLbl.position.set(mx, my, mz);
          e._edgeLblEl.style.display = active ? 'block' : 'none';
        }
      });

      // Update cluster bubble center (follows physics)
      if (clusterMesh && selectedNode) {
        const all = [selectedNode, ...getConnected(selectedNode)];
        const cx = all.reduce((s, n) => s + n.x, 0) / all.length;
        const cy = all.reduce((s, n) => s + n.y, 0) / all.length;
        const cz = all.reduce((s, n) => s + n.z, 0) / all.length;
        let maxR = 0;
        all.forEach(n => {
          const d = Math.sqrt((n.x - cx) ** 2 + (n.y - cy) ** 2 + (n.z - cz) ** 2) + nodeR(n) + 14;
          if (d > maxR) maxR = d;
        });
        clusterMesh.position.set(cx, cy, cz);
        clusterMesh.scale.setScalar(maxR);
      }
    }

    // ── Start ──
    initPositions();
    function animate() {
      requestAnimationFrame(animate);
      stepPhysics();
      updateVisuals();
      controls.update();
      renderer.render(scene, camera);
      labelRenderer.render(scene, camera);
    }
    animate();
  </script>
</body>

</html>
